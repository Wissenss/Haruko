<!DOCTYPE html>
<html lang="en">

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Haruko — Guess The Movie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Lora:ital@1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/shared.css') }}"/>
  <style>

     /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-1);
      text-decoration: none;
    }

    .nav-sep { color: var(--border); font-size: 18px; }

    .nav-page {
      font-size: 13px;
      color: var(--text-2);
    }

    /* ── Main ── */
    main {
      flex: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 52px 24px 80px;
      width: 100%;
    }

    .greeting {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 12px;
    }

    .page-title {
      font-size: 30px;
      font-weight: 500;
      letter-spacing: -0.04em;
      color: var(--text-1);
      margin-bottom: 40px;
      line-height: 1.15;
    }

    /* .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 14px;
    } */


    .contibutors-list {
        max-width: 600px;
        display: flex;
        gap: 10px;
        justify-content: center;
    }

    .contributors-list-item {
        display: grid;
        grid-template-columns: auto;
        grid-template-rows: auto auto auto;
        max-width: 200px;
        margin: auto;
        text-align: center;
        align-items: center;
        gap: 10px;
        padding: 24px;
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        text-decoration: none;
        color: var(--text-1);
        transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }

    .contributors-list-item-img {   
        max-width: 100px;
        max-height: 100px;
        margin: auto;
    }

    .contributors-list-item-name {
        font-size: small;
    }

    .contributors-list-item-quote {
        font-style: italic;
        font-size: small;
    }
  </style>
</head>

<body>

      <a href="{{ url_for('index')}}" class="logo">Haruko</a>
      <span class="nav-sep">›</span>

    </div>
  </header>

  <script>

    async function init()
    {

        let response = await fetch("https://api.github.com/repos/Wissenss/Haruko/contributors");
        
        let data = await response.json();
        
        data.forEach(c => {
            // create the element
            let item = document.createElement("a");
            item.setAttribute("class", "contributors-list-item")
            item.setAttribute("href", c.url);
            item.setAttribute("target", "_blank");

            let img = document.createElement("img");
            img.setAttribute("class", "contributors-list-item-img");
            img.setAttribute("src", c.avatar_url);
            item.appendChild(img);
            
            let name = document.createElement("span");
            name.setAttribute("class", "contributors-list-item-name");
            name.innerHTML = c.login;
            item.appendChild(name);

            // todo: check about adding quotes
            //let quote = document.createElement("span");
            //quote.setAttribute("class", "contributors-list-item-quote");
            //quote.innerHTML = "";
            //item.appendChild(quote);

            //item.innerHTML = c.login;

            // append it to the list
            let list = document.getElementById("contibutors-list")
            
            list.appendChild(item);
        });
    }

    init();

  </script>
