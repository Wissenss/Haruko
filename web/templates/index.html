<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Haruko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/shared.css') }}"/>
  <style>

    header {
      display: flex;
      align-items: center;
      padding: 0 24px;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-1);
      text-decoration: none;
    }

    main {
      flex: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 64px 24px 80px;
      width: 100%;
    }

    .greeting {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 12px;
    }

    .page-title {
      font-size: 30px;
      font-weight: 500;
      letter-spacing: -0.04em;
      color: var(--text-1);
      margin-bottom: 40px;
      line-height: 1.15;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .nav-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 24px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text-1);
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }

    .nav-card:hover {
      border-color: var(--text-1);
      box-shadow: 0 8px 24px rgba(0,0,0,0.07);
      transform: translateY(-2px);
    }

    .card-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-1);
      letter-spacing: -0.01em;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-3);
      line-height: 1.5;
    }

    .card-arrow {
      margin-top: 16px;
      font-size: 16px;
      color: var(--text-3);
      transition: color 0.12s, transform 0.12s;
    }

    .nav-card:hover .card-arrow {
      color: var(--text-1);
      transform: translateX(3px);
    }

    @media (max-width: 480px) {
      main { padding: 40px 16px 60px; }
      .page-title { font-size: 24px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="{{ url_for('index')}}" class="logo">Haruko</a>
  </header>

  <main>
    <p class="greeting">Hi,</p>
    <h1 class="page-title">Here's what I can do</h1>

    <div class="card-grid">
      <a href="{{url_for('list_index')}}" class="nav-card">
        <span class="card-title">Lists</span>
        <span class="card-desc">Browse your watchlists, backlogs, and collections.</span>
        <span class="card-arrow">→</span>
      </a>
      <a href="{{url_for('games_movie_plot')}}" class="nav-card">
        <span class="card-title">Guess the Movie</span>
        <span class="card-desc">Read a plot summary and identify the film.</span>
        <span class="card-arrow">→</span>
      </a>
      <a href="{{url_for('contibutors_list')}}" class="nav-card">
        <span class="card-title">Collaborators</span>
        <span class="card-desc">Know the people that made Haruko possible.</span>
        <span class="card-arrow">→</span>
      </a>
    </div>
  </main>

</body>
</html>
